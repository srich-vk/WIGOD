name: Daily WIGOD update

# Scrapes new TN Government Orders, summarizes them (Groq), re-renders the static
# timeline into docs/, and commits the result + the dedup ledger back to main.
# GitHub Pages serves from main /docs.

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC (~07:30 IST) daily
  workflow_dispatch:        # allow manual runs from the Actions tab

# Never let two runs overlap (they'd race on the committed ledger).
concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write           # push docs/ + data/tracker.db back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # fail fast; never grind for hours on a slow site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe tn.gov.in reachability
        run: |
          echo "Timing a request to the GO listing endpoint from this runner:"
          curl -sS -o /dev/null -m 30 \
            -w "HTTP %{http_code} | connect %{time_connect}s | total %{time_total}s\n" \
            "https://www.tn.gov.in/godept_list.php" || echo "UNREACHABLE from runner"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-tam

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline and render site
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: groq
          WIGOD_SITE_DIR: docs
          PYTHONUNBUFFERED: "1"   # stream logs live instead of buffering to the end
        run: |
          python -m tntracker.pipeline --year "$(date -u +%Y)"
          python -m tntracker.render

      - name: Commit and push updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs data/tracker.db
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily update: refresh timeline and ledger [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
